<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Estudiantes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Grupo 8</h1>
    <h2>Registro de Estudiantes</h2>
  </header>

  <nav>
    <a href="Dashboard.html">Inicio</a>
    <a href="registro.html">Registro</a>
    <a href="#">Contacto</a>
  </nav>

  <main>
    <section>
  <h2>Formulario de Registro de Estudiantes</h2>
  <div id="mensaje-formulario"></div>

  <form id="formulario-registro" novalidate>
    <div style="margin-bottom: 1rem;">
      <label for="nombre-estudiante">Nombre Completo:</label><br>
      <input type="text" id="nombre-estudiante" name="nombre-estudiante" autocomplete="name" required>
      <span id="error-nombre" class="error-text"></span>
    </div>

    <div style="margin-bottom: 1rem;">
      <label for="matricula-estudiante">Matrícula:</label><br>
      <input type="text" id="matricula-estudiante" name="matricula-estudiante" autocomplete="off" required>
      <span id="error-matricula" class="error-text"></span>
    </div>

    <div style="margin-bottom: 1rem;">
      <label for="correo-estudiante">Correo Electrónico:</label><br>
      <input type="email" id="correo-estudiante" name="correo-estudiante" autocomplete="email" required>
      <span id="error-correo" class="error-text"></span>
    </div>

    <div style="margin-bottom: 1rem;">
      <label for="fecha-nacimiento">Fecha de Nacimiento:</label><br>
      <input type="date" id="fecha-nacimiento" name="fecha-nacimiento" autocomplete="off" required>
      <span id="error-fecha" class="error-text"></span>
    </div>

    <div style="margin-bottom: 1rem;">
      <label for="curso-estudiante">Curso:</label><br>
      <select id="curso-estudiante" name="curso-estudiante" autocomplete="off">
        <option value="diseno-web">Diseño Web</option>
        <option value="programacion">Programación</option>
        <option value="diseno-grafico">Diseño Gráfico</option>
      </select>
    </div>

    <button type="submit">Registrar</button>
  </form>
</section>

<script src="script.js"></script>
  </main>
</body>
</html>
