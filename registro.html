  <script>
    // Validar sesión al cargar la página
    fetch('backend/validar_sesion.php')
      .then(res => res.json())
      .then(data => {
        if (!data.autenticado) {
          window.location.href = 'login.html';
        }
      })
      .catch(() => window.location.href = 'login.html');

    // Registro de estudiante por AJAX
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('formulario-registro');
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        // Limpiar mensajes
        document.getElementById('error-nombre').textContent = '';
        document.getElementById('error-matricula').textContent = '';
        document.getElementById('error-correo').textContent = '';
        document.getElementById('error-fecha').textContent = '';

        // Tomar valores
        const nombre = document.getElementById('nombre-estudiante').value.trim();
        const matricula = document.getElementById('matricula-estudiante').value.trim();
        const correo = document.getElementById('correo-estudiante').value.trim();
        const fecha = document.getElementById('fecha-nacimiento').value;
        const curso = document.getElementById('curso-estudiante').value;

        // Validación básica
        let valido = true;
        if (!nombre) {
          document.getElementById('error-nombre').textContent = 'Nombre requerido';
          valido = false;
        }
        if (!matricula) {
          document.getElementById('error-matricula').textContent = 'Matrícula requerida';
          valido = false;
        }
        if (!correo) {
          document.getElementById('error-correo').textContent = 'Correo requerido';
          valido = false;
        }
        if (!fecha) {
          document.getElementById('error-fecha').textContent = 'Fecha requerida';
          valido = false;
        }
        if (!curso) {
          alert('Seleccione un curso');
          valido = false;
        }
        if (!valido) return;

        // Enviar datos al backend
        try {
          const resp = await fetch('backend/registrar.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              nombre: nombre,
              matricula: matricula,
              correo: correo,
              fechaNacimiento: fecha,
              curso: curso
            })
          });
          const data = await resp.json();
          if (data.success) {
            alert('Estudiante registrado correctamente');
            form.reset();
          } else {
            alert(data.error || data.mensaje || 'Error al registrar');
          }
        } catch (err) {
          alert('Error de conexión con el servidor');
        }
      });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
